<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site no GitHub</title>
    <style>
        /* Um toque de CSS para o site ficar centralizado e bonito */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #333; }
        p { color: #666; }
        .link-github {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #24292e;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 Meu Primeiro Deploy!</h1>
        <p>Este site está sendo hospedado gratuitamente pelo <strong>GitHub Pages</strong>.</p>
        <p>Próximo passo: adicionar meus projetos aqui.</p>
        <a href="#" class="link-github">Ver meu perfil</a>
    </div>

</body>
</html>
